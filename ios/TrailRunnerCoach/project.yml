name: TrailRunnerCoach
options:
  bundleIdPrefix: com.yourcompany
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.10
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    CODE_SIGN_STYLE: Automatic
targets:
  TrailRunnerCoach:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    info:
      path: Resources/Info.plist
    entitlements:
      path: Resources/TrailRunnerCoach.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.trailrunnercoach
        PRODUCT_NAME: Trail Runner Coach
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  TrailRunnerCoach:
    build:
      targets:
        TrailRunnerCoach: all
    run:
      config: Debug
    archive:
      config: Release
