<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <meta name="description" content="Local-first adaptive trail running coach with recovery, strain, pain and multi-race planning">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/assets/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles/app.css">
  <title>Trail Runner Coach</title>
</head>
<body>
  <div id="app" class="app-shell">
    <header class="app-header">
      <a class="brand" href="#/today" aria-label="Trail Runner Coach Home">
        <span class="brand-mark" aria-hidden="true">▲</span>
        <span><strong>TRAIL RUNNER</strong><small>ADAPTIVE COACH</small></span>
      </a>
      <button id="quick-add" class="icon-button" aria-label="เพิ่มข้อมูล">＋</button>
    </header>
    <main id="view" class="view" tabindex="-1">
      <div class="loading-card">กำลังเตรียมข้อมูลในเครื่อง…</div>
    </main>
    <nav class="bottom-nav" aria-label="เมนูหลัก">
      <a href="#/today" data-route="today"><span>⌂</span><small>วันนี้</small></a>
      <a href="#/plan" data-route="plan"><span>▦</span><small>แผน</small></a>
      <a href="#/checkin" data-route="checkin" class="primary-nav"><span>♡</span><small>Check</small></a>
      <a href="#/rehab" data-route="rehab"><span>↟</span><small>Rehab</small></a>
      <a href="#/more" data-route="more"><span>•••</span><small>เพิ่มเติม</small></a>
    </nav>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <dialog id="modal" class="modal"><div id="modal-content"></div></dialog>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
