<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Trail Coach">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="Local-first adaptive trail running coach with recovery, strain, pain and multi-race planning">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/assets/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles/app.css">
  <title>Trail Runner Coach</title>
</head>
<body>
  <div id="app" class="app-shell">
    <header class="app-header">
      <a class="brand" href="#/today" aria-label="Trail Runner Coach Home">
        <span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 18 9.2 7.5l3.1 5 2.7-4.2L21 18H3Z"/></svg></span>
        <span><strong>Trail Runner Coach</strong><small>TRAIN · RECOVER · ADAPT</small></span>
      </a>
      <div class="header-actions"><button id="language-toggle" class="language-button" type="button" aria-label="Switch to English">EN</button><button id="quick-add" class="icon-button" data-aria-th="เพิ่มข้อมูล" data-aria-en="Add data" aria-label="เพิ่มข้อมูล"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg></button></div>
    </header>
    <main id="view" class="view" tabindex="-1">
      <div class="loading-card" data-label-th="กำลังเตรียมข้อมูลในเครื่อง…" data-label-en="Preparing local data…">กำลังเตรียมข้อมูลในเครื่อง…</div>
    </main>
    <nav class="bottom-nav" data-aria-th="เมนูหลัก" data-aria-en="Main navigation" aria-label="เมนูหลัก">
      <a href="#/today" data-route="today"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5v8a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-8Z"/></svg><small data-label-th="วันนี้" data-label-en="Today">วันนี้</small></a>
      <a href="#/plan" data-route="plan"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3v3M18 3v3M4 8h16M5 5h14a1 1 0 0 1 1 1v14H4V6a1 1 0 0 1 1-1Z"/></svg><small data-label-th="แผน" data-label-en="Plan">แผน</small></a>
      <a href="#/train" data-route="train"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 18 5.5-8 3 4 3.2-6L21 18H3Z"/><path d="M7 18c2.5-2 4-2.2 6-1.2 1.6.8 3 .7 4.2-.2"/></svg><small data-label-th="ฝึก" data-label-en="Train">ฝึก</small></a>
      <a href="#/fuel" data-route="fuel"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3v7a3 3 0 0 1-3 3V3M5 13v8M16 3v18M16 3c3 1 4 3.5 4 6 0 2.8-1.5 4.5-4 5"/></svg><small data-label-th="อาหาร" data-label-en="Food">อาหาร</small></a>
      <a href="#/more" data-route="more"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg><small data-label-th="เพิ่มเติม" data-label-en="More">เพิ่มเติม</small></a>
    </nav>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <dialog id="modal" class="modal"><div id="modal-content"></div></dialog>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
